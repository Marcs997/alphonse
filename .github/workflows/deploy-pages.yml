name: Deploy to GitHub Pages

# Publie le site (fichiers statiques à la racine) à chaque push sur main.
# Plus fiable que le constructeur "branche" historique.

on:
  push:
    branches: [main]
  workflow_dispatch:        # permet de relancer à la main depuis l'onglet Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # tout le dépôt (le jeu est à la racine)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
