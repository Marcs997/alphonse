<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Verrouille l'affichage mobile : pas de zoom, pas de scroll -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#7ec850">
  <title>Alphonse</title>
  <link rel="icon" href="data:,">
  <!-- ?v=… : à incrémenter à chaque version pour forcer le rechargement
       (sinon le navigateur garde l'ancien code en cache). -->
  <link rel="stylesheet" href="style.css?v=3.2">
</head>
<body>
  <!-- Le jeu entier est dessiné dans ce canvas -->
  <div id="game-wrap">
    <canvas id="game" width="720" height="1280"></canvas>
  </div>

  <!-- Version globale (sert aussi à recharger les images) -->
  <script>window.APP_VERSION = "3.2";</script>
  <!-- assets.js charge les images, audio.js le son, game.js tout le jeu -->
  <script src="js/assets.js?v=3.2"></script>
  <script src="js/audio.js?v=3.2"></script>
  <script src="js/game.js?v=3.2"></script>
</body>
</html>
